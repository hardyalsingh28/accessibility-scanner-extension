<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accessibility Report</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: #f5f7fa;
      color: #333;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 40px 30px;
      text-align: center;
    }

    .header h1 {
      font-size: 32px;
      margin-bottom: 10px;
    }

    .header p {
      font-size: 16px;
      opacity: 0.9;
    }

    .content {
      padding: 40px 30px;
    }

    .report-meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 40px;
      padding: 20px;
      background: #f9f9f9;
      border-radius: 8px;
    }

    .meta-item {
      text-align: center;
    }

    .meta-label {
      font-size: 12px;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
      font-weight: 600;
    }

    .meta-value {
      font-size: 24px;
      font-weight: bold;
      color: #333;
    }

    .issues-section {
      margin-bottom: 40px;
    }

    .section-title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 2px solid #e0e7ff;
    }

    .issue-category {
      margin-bottom: 30px;
    }

    .category-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 15px;
      padding: 12px 16px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .category-title.critical {
      background: #fff5f4;
      color: #f93b1d;
    }

    .category-title.warning {
      background: #fffaf5;
      color: #ffa500;
    }

    .category-title.info {
      background: #f5f7fa;
      color: #667eea;
    }

    .category-count {
      margin-left: auto;
      font-size: 18px;
      font-weight: bold;
    }

    .issues-grid {
      display: grid;
      gap: 12px;
      margin-top: 12px;
    }

    .issue-card {
      padding: 16px;
      border-left: 4px solid;
      border-radius: 6px;
      background: white;
    }

    .issue-card.critical {
      border-left-color: #f93b1d;
      background: #fff5f4;
    }

    .issue-card.warning {
      border-left-color: #ffa500;
      background: #fffaf5;
    }

    .issue-card.info {
      border-left-color: #667eea;
      background: #f5f7fa;
    }

    .issue-title {
      font-weight: 600;
      margin-bottom: 8px;
      font-size: 14px;
    }

    .issue-card.critical .issue-title {
      color: #f93b1d;
    }

    .issue-card.warning .issue-title {
      color: #ffa500;
    }

    .issue-card.info .issue-title {
      color: #667eea;
    }

    .issue-description {
      font-size: 13px;
      color: #666;
      margin-bottom: 8px;
      line-height: 1.5;
    }

    .issue-fix {
      font-size: 12px;
      background: rgba(0, 0, 0, 0.05);
      padding: 8px 12px;
      border-radius: 4px;
      color: #555;
      font-style: italic;
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #999;
    }

    .empty-state p {
      font-size: 16px;
      margin-bottom: 10px;
    }

    .footer {
      text-align: center;
      padding: 30px;
      border-top: 1px solid #e0e7ff;
      color: #999;
      font-size: 12px;
    }

    .print-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 10px 16px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
    }

    .print-btn:hover {
      background: #764ba2;
    }

    @media print {
      .print-btn {
        display: none;
      }

      body {
        background: white;
      }

      .container {
        box-shadow: none;
      }
    }

    @media (max-width: 600px) {
      .header {
        padding: 30px 20px;
      }

      .header h1 {
        font-size: 24px;
      }

      .content {
        padding: 20px;
      }

      .report-meta {
        grid-template-columns: 1fr;
      }

      .print-btn {
        padding: 8px 12px;
        font-size: 12px;
        top: 10px;
        right: 10px;
      }
    }
  </style>
</head>
<body>
  <button class="print-btn" onclick="window.print()">🖨️ Print</button>

  <div class="container">
    <div class="header">
      <h1>♿ Accessibility Report</h1>
      <p>Detailed scan results and recommendations</p>
    </div>

    <div class="content">
      <div class="report-meta">
        <div class="meta-item">
          <div class="meta-label">Scan Date & Time</div>
          <div class="meta-value" id="timestamp">--</div>
        </div>
        <div class="meta-item">
          <div class="meta-label">Total Issues</div>
          <div class="meta-value" id="totalIssues">0</div>
        </div>
      </div>

      <div class="issues-section">
        <h2 class="section-title">Issues Found</h2>

        <div class="issue-category">
          <div class="category-title critical">
            <span>🚨 Critical Issues</span>
            <span class="category-count" id="criticalCountReport">0</span>
          </div>
          <div class="issues-grid" id="criticalIssuesReport"></div>
        </div>

        <div class="issue-category">
          <div class="category-title warning">
            <span>⚠️ Warnings</span>
            <span class="category-count" id="warningCountReport">0</span>
          </div>
          <div class="issues-grid" id="warningIssuesReport"></div>
        </div>

        <div class="issue-category">
          <div class="category-title info">
            <span>ℹ️ Tips & Best Practices</span>
            <span class="category-count" id="infoCountReport">0</span>
          </div>
          <div class="issues-grid" id="infoIssuesReport"></div>
        </div>
      </div>

      <div class="footer">
        <p>Generated by Accessibility Scanner Extension</p>
        <p>For more information, visit <a href="https://www.w3.org/WAI/" target="_blank">W3C Web Accessibility Initiative</a></p>
      </div>
    </div>
  </div>

  <script>
    // Load and display the report
    chrome.storage.local.get('lastReport', (result) => {
      if (result.lastReport) {
        const report = result.lastReport;
        const issues = report.issues;

        // Set metadata
        document.getElementById('timestamp').textContent = report.timestamp;
        document.getElementById('totalIssues').textContent = report.totalIssues;

        // Display critical issues
        displayIssues(issues.critical, 'critical');

        // Display warnings
        displayIssues(issues.warning, 'warning');

        // Display info
        displayIssues(issues.info, 'info');
      }
    });

    function displayIssues(issues, type) {
      const container = document.getElementById(`${type}IssuesReport`);
      const countEl = document.getElementById(`${type}CountReport`);

      countEl.textContent = issues.length;

      if (issues.length === 0) {
        container.innerHTML = '<div class="empty-state"><p>No ' + type + ' issues found</p></div>';
        return;
      }

      issues.forEach((issue) => {
        const card = document.createElement('div');
        card.className = `issue-card ${type}`;
        card.innerHTML = `
          <div class="issue-title">${issue.title}</div>
          <div class="issue-description">${issue.description}</div>
          ${issue.fix ? `<div class="issue-fix"><strong>Recommendation:</strong> ${issue.fix}</div>` : ''}
        `;
        container.appendChild(card);
      });
    }
  </script>
</body>
</html>
